spring.application.name=Globex
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# -----------------------------
# DATABASE CONFIG
# -----------------------------
spring.datasource.url=${APP_DATABASE_URL}
spring.datasource.username=${APP_DATABASE_USERNAME}
spring.datasource.password=${APP_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
						   
spring.datasource.hikari.data-source-properties.sslmode=require

# -----------------------------
# JPA / HIBERNATE
# -----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# -----------------------------
# MARKET DATA API
# -----------------------------
twelvedata.api.key=${TWELVEDATA_API_KEY}
marketdata.api.daily-call-limit=${MARKETDATA_API_DAILY_CALL_LIMIT:800}
marketdata.api.batch-credit-cost=${MARKETDATA_API_BATCH_CREDIT_COST:50}
marketdata.api.rate-limit-cooldown-minutes=${MARKETDATA_API_RATE_LIMIT_COOLDOWN_MINUTES:720}
marketdata.api.timezone=${MARKETDATA_API_TIMEZONE:America/Toronto}

# Twelve Data charges quote credits per symbol, so the default cadence is conservative.
# Closed-market cycles are skipped, provider 429s trigger a cooldown, and the persisted budget hard-stops at 800.
marketdata.refresh.delay-ms=${MARKETDATA_REFRESH_DELAY_MS:5400000}
marketdata.refresh.initial-delay-ms=${MARKETDATA_REFRESH_INITIAL_DELAY_MS:10000}
