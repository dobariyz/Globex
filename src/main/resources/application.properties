spring.application.name=Globex
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# -----------------------------
# DATABASE CONFIG
# -----------------------------
spring.datasource.url=${APP_DATABASE_URL}
spring.datasource.username=${APP_DATABASE_USERNAME}
spring.datasource.password=${APP_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
						   
spring.datasource.hikari.data-source-properties.sslmode=require

# -----------------------------
# JPA / HIBERNATE
# -----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# -----------------------------
# MARKET DATA API
# -----------------------------
twelvedata.api.key=${TWELVEDATA_API_KEY}
marketdata.api.daily-call-limit=${MARKETDATA_API_DAILY_CALL_LIMIT:800}
marketdata.api.minute-credit-limit=${MARKETDATA_API_MINUTE_CREDIT_LIMIT:8}
marketdata.api.credit-cost-per-symbol=${MARKETDATA_API_CREDIT_COST_PER_SYMBOL:1}
marketdata.api.rate-limit-cooldown-minutes=${MARKETDATA_API_RATE_LIMIT_COOLDOWN_MINUTES:2}
marketdata.api.timezone=${MARKETDATA_API_TIMEZONE:America/Toronto}
marketdata.api.trading-timezone=${MARKETDATA_API_TRADING_TIMEZONE:America/New_York}
marketdata.api.trading-open-time=${MARKETDATA_API_TRADING_OPEN_TIME:09:30}
marketdata.api.trading-close-time=${MARKETDATA_API_TRADING_CLOSE_TIME:16:00}

# Basic 8 allows 8 API credits/minute and 800/day. Updating 8 symbols every 15 minutes stays under both limits.
marketdata.refresh.delay-ms=${MARKETDATA_REFRESH_DELAY_MS:900000}
marketdata.refresh.initial-delay-ms=${MARKETDATA_REFRESH_INITIAL_DELAY_MS:10000}
