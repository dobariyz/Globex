spring.application.name=Globex
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

# -----------------------------
# DATABASE CONFIG
# -----------------------------
spring.datasource.url=${APP_DATABASE_URL}
spring.datasource.username=${APP_DATABASE_USERNAME}
spring.datasource.password=${APP_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
						   
spring.datasource.hikari.data-source-properties.sslmode=require

# -----------------------------
# JPA / HIBERNATE
# -----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# -----------------------------
# MARKET DATA API
# -----------------------------
twelvedata.api.key=${TWELVEDATA_API_KEY}
marketdata.api.daily-call-limit=${MARKETDATA_API_DAILY_CALL_LIMIT:800}
marketdata.api.timezone=${MARKETDATA_API_TIMEZONE:America/Toronto}

# One batched Twelve Data quote call every 2 minutes is at most ~720 calls/day.
# Closed-market cycles are skipped, and the persisted budget counter hard-stops at 800.
marketdata.refresh.delay-ms=${MARKETDATA_REFRESH_DELAY_MS:120000}
marketdata.refresh.initial-delay-ms=${MARKETDATA_REFRESH_INITIAL_DELAY_MS:10000}
